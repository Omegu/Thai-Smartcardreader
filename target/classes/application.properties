# Server configuration
server.port=9000

# Hide Spring Banner
spring.main.banner-mode=off

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,swagger-ui,openapi
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# Application info
info.app.name=Thai ID Bridge Service
info.app.version=1.0.0
info.app.description=Local Bridge Service for Thai ID Card

# Webhook configuration (optional)
webhook.enabled=false
webhook.url=
webhook.secret=

# Rate Limiting configuration
ratelimit.enabled=true
ratelimit.capacity=10
ratelimit.refill-minutes=1

# Logging configuration (Optional)
logging.level.org.springframework=WARN
logging.level.com.idbridge=INFO
